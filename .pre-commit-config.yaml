# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.12
  hooks:
    - id: ruff-check
      args: [ --fix ]
    - id: ruff-format

- repo: local
  hooks:
    - id: mypy
      name: mypy
      entry: bash -c 'cd backend && uv run mypy .'
      language: system
      types: [python]
      pass_filenames: false
